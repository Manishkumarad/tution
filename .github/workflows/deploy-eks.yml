name: Deploy To EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  ECR_BACKEND_REPO: tuition-backend
  ECR_FRONTEND_REPO: tuition-frontend
  K8S_NAMESPACE: tuition-saas

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub variables and secrets
        shell: bash
        env:
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID_VAR: ${{ vars.AWS_ACCOUNT_ID }}
          EKS_CLUSTER_NAME_VAR: ${{ vars.EKS_CLUSTER_NAME }}
          VITE_API_BASE_URL_VAR: ${{ vars.VITE_API_BASE_URL }}
          AWS_ACCESS_KEY_ID_SECRET: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          JWT_ACCESS_SECRET_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          RAZORPAY_KEY_ID_SECRET: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          missing=0

          check_required() {
            local value="$1"
            local name="$2"
            local hint="$3"

            if [[ -z "$value" ]]; then
              echo "::error title=Missing required configuration::${name} is not set (${hint})"
              missing=1
            fi
          }

          check_required "$AWS_REGION_VAR" "AWS_REGION" "Repository Variable"
          check_required "$AWS_ACCOUNT_ID_VAR" "AWS_ACCOUNT_ID" "Repository Variable"
          check_required "$EKS_CLUSTER_NAME_VAR" "EKS_CLUSTER_NAME" "Repository Variable"
          check_required "$VITE_API_BASE_URL_VAR" "VITE_API_BASE_URL" "Repository Variable"

          check_required "$AWS_ACCESS_KEY_ID_SECRET" "AWS_ACCESS_KEY_ID" "Repository Secret"
          check_required "$AWS_SECRET_ACCESS_KEY_SECRET" "AWS_SECRET_ACCESS_KEY" "Repository Secret"
          check_required "$DATABASE_URL_SECRET" "DATABASE_URL" "Repository Secret"
          check_required "$JWT_ACCESS_SECRET_SECRET" "JWT_ACCESS_SECRET" "Repository Secret"
          check_required "$JWT_REFRESH_SECRET_SECRET" "JWT_REFRESH_SECRET" "Repository Secret"
          check_required "$RAZORPAY_KEY_ID_SECRET" "RAZORPAY_KEY_ID" "Repository Secret"
          check_required "$RAZORPAY_KEY_SECRET_SECRET" "RAZORPAY_KEY_SECRET" "Repository Secret"
          check_required "$RAZORPAY_WEBHOOK_SECRET_SECRET" "RAZORPAY_WEBHOOK_SECRET" "Repository Secret"

          if [[ "$missing" -ne 0 ]]; then
            echo "::error title=Deploy preflight failed::Set missing repo variables/secrets, then re-run Deploy To EKS"
            exit 1
          fi

          echo "Deploy preflight checks passed."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: vars
        run: |
          echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${ECR_REGISTRY}/${ECR_BACKEND_REPO}:${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          docker build -t "${{ steps.vars.outputs.backend_image }}" -f Dockerfile .
          docker push "${{ steps.vars.outputs.backend_image }}"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "${{ steps.vars.outputs.frontend_image }}" \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            .
          docker push "${{ steps.vars.outputs.frontend_image }}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${K8S_NAMESPACE}" || kubectl create namespace "${K8S_NAMESPACE}"

      - name: Apply base manifests
        run: |
          kubectl apply -k k8s/base

      - name: Create or update backend secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic backend-secret \
            --from-literal=DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            --from-literal=JWT_ACCESS_SECRET='${{ secrets.JWT_ACCESS_SECRET }}' \
            --from-literal=JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
            --from-literal=RAZORPAY_KEY_ID='${{ secrets.RAZORPAY_KEY_ID }}' \
            --from-literal=RAZORPAY_KEY_SECRET='${{ secrets.RAZORPAY_KEY_SECRET }}' \
            --from-literal=RAZORPAY_WEBHOOK_SECRET='${{ secrets.RAZORPAY_WEBHOOK_SECRET }}' \
            --from-literal=SMTP_HOST='${{ secrets.SMTP_HOST }}' \
            --from-literal=SMTP_USER='${{ secrets.SMTP_USER }}' \
            --from-literal=SMTP_PASS='${{ secrets.SMTP_PASS }}' \
            --from-literal=OWNER_ALERT_EMAIL='${{ secrets.OWNER_ALERT_EMAIL }}' \
            --from-literal=SMS_PROVIDER_URL='${{ secrets.SMS_PROVIDER_URL }}' \
            --from-literal=SMS_PROVIDER_TOKEN='${{ secrets.SMS_PROVIDER_TOKEN }}' \
            --from-literal=TWILIO_ACCOUNT_SID='${{ secrets.TWILIO_ACCOUNT_SID }}' \
            --from-literal=TWILIO_AUTH_TOKEN='${{ secrets.TWILIO_AUTH_TOKEN }}' \
            --from-literal=TWILIO_FROM_NUMBER='${{ secrets.TWILIO_FROM_NUMBER }}' \
            --from-literal=TWILIO_MESSAGING_SERVICE_SID='${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}' \
            --from-literal=WHATSAPP_PROVIDER_URL='${{ secrets.WHATSAPP_PROVIDER_URL }}' \
            --from-literal=WHATSAPP_PROVIDER_TOKEN='${{ secrets.WHATSAPP_PROVIDER_TOKEN }}' \
            --from-literal=WHATSAPP_SENDER='${{ secrets.WHATSAPP_SENDER }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployments with new images
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/tuition-backend backend="${{ steps.vars.outputs.backend_image }}"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/tuition-worker worker="${{ steps.vars.outputs.backend_image }}"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/tuition-frontend frontend="${{ steps.vars.outputs.frontend_image }}"

      - name: Rollout status
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/tuition-backend --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/tuition-worker --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/tuition-frontend --timeout=180s
