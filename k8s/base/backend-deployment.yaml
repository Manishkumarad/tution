apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuition-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tuition-backend
  template:
    metadata:
      labels:
        app: tuition-backend
    spec:
      containers:
        - name: backend
          image: <aws-account-id>.dkr.ecr.<region>.amazonaws.com/tuition-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
