apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuition-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tuition-frontend
  template:
    metadata:
      labels:
        app: tuition-frontend
    spec:
      containers:
        - name: frontend
          image: <aws-account-id>.dkr.ecr.<region>.amazonaws.com/tuition-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
