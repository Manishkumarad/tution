<svg width="1200" height="1400" viewBox="0 0 1200 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="room" x1="83" y1="74" x2="1123" y2="1352" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A6072"/>
      <stop offset="0.54" stop-color="#0A7E84"/>
      <stop offset="1" stop-color="#2EA56F"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#103E3C"/>
      <stop offset="1" stop-color="#1A5C53"/>
    </linearGradient>
    <linearGradient id="desk" x1="142" y1="937" x2="1006" y2="1178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5AF59"/>
      <stop offset="1" stop-color="#E79339"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 210) rotate(90) scale(250)">
      <stop stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="1200" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="1400" fill="url(#room)"/>
  <rect width="1200" height="1400" fill="url(#sun)"/>

  <g opacity="0.95">
