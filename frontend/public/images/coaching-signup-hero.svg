    <rect x="480" y="368" width="252" height="182" rx="18" fill="#225F59"/>
    <rect x="480" y="368" width="252" height="182" rx="18" fill="#FFFFFF" fill-opacity="0.1"/>
    <rect x="764" y="368" width="252" height="182" rx="18" fill="#245C58"/>
    <rect x="764" y="368" width="252" height="182" rx="18" fill="#FFFFFF" fill-opacity="0.12"/>
